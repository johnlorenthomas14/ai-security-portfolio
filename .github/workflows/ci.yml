name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prompt-injection-pipeline:
    name: Project 1 — pytest + heuristic eval
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: 01-prompt-injection-pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: 01-prompt-injection-pipeline/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (offline, no API key)
        run: pytest -q

      - name: Run heuristic-only eval (must hit F1 >= 0.85)
        run: python run_eval.py
