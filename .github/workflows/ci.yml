name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prompt-injection-pipeline:
    name: Project 1 — pytest + heuristic eval
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: 01-prompt-injection-pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: 01-prompt-injection-pipeline/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (offline, no API key)
        run: pytest -q

      - name: Run heuristic-only eval (must hit F1 >= 0.85)
        run: python run_eval.py

  red-team-framework:
    name: Project 2 — pytest + demo run
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: 02-ai-red-team-framework

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: 02-ai-red-team-framework/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Project 2's scorer imports Project 1's detector, so we need
          # Project 1's deps installed in the same environment.
          pip install -r ../01-prompt-injection-pipeline/requirements.txt

      - name: Run pytest (offline, no API key)
        run: pytest -q

      - name: Run framework end-to-end against the demo target
        # The runner exits non-zero if any probe verdict is "fail" — and
        # the demo target is *intentionally* vulnerable, so this run is
        # *expected* to exit non-zero. Capture stdout but don't fail the
        # build on it; the pytest step is the real gate.
        run: |
          python runner.py --target demo --output ./out --quiet || true
          test -f ./out/findings.json
          test -f ./out/airmf_evidence.md

  rag-security-auditor:
    name: Project 3 — pytest + demo corpus audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: 03-rag-security-auditor

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: 03-rag-security-auditor/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # The injection scanner imports Project 1's detector.
          pip install -r ../01-prompt-injection-pipeline/requirements.txt

      - name: Run pytest (offline, no API key)
        run: pytest -q

      - name: Audit the shipped demo corpus end-to-end
        # The auditor exits non-zero on any critical/high finding — and
        # the demo corpus is intentionally polluted, so this is expected
        # to exit non-zero. pytest is the real gate.
        run: |
          python auditor.py --corpus corpus/demo --output ./out --quiet || true
          test -f ./out/findings.json
          test -f ./out/audit_report.md

  siem-correlation-generator:
    name: Project 4 — pytest + generate detection content
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: 04-siem-correlation-generator

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: 04-siem-correlation-generator/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (offline, no API key)
        run: pytest -q

      - name: Generate detection content end-to-end
        run: |
          python generator.py --output ./out --quiet
          test -d ./out/splunk_es
          test -d ./out/sigma
          test -d ./out/cortex_xsiam
          test -f ./out/coverage_map.md

  output-compliance-monitor:
    name: Project 5 — pytest + corpus replay + audit-chain verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: 05-llm-output-compliance-monitor

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: 05-llm-output-compliance-monitor/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (offline, no API key)
        run: pytest -q

      - name: Replay good + bad sample corpora through the monitor
        # Bad corpus is intentionally polluted — the monitor exits non-zero
        # if any response was blocked, which is the correct behavior. pytest
        # is the real gate.
        run: |
          python monitor.py --corpus samples/good_outputs.jsonl --audit-log ./out/audit.jsonl --quiet
          python monitor.py --corpus samples/bad_outputs.jsonl --audit-log ./out/audit.jsonl --quiet || true
          test -f ./out/audit.jsonl

      - name: Verify the hash-chained audit log's integrity
        run: python monitor.py --verify ./out/audit.jsonl

  model-supply-chain-scanner:
    name: Project 6 — pytest + scan demo model + emit SBOM
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: 06-model-supply-chain-scanner

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: 06-model-supply-chain-scanner/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (offline, no API key)
        run: pytest -q

      - name: Scan the shipped demo model end-to-end
        # Scanner exits non-zero on critical/high findings — demo model is
        # designed to surface a high-severity 'requests' dep finding by
        # default, so non-zero is expected. pytest is the real gate.
        run: |
          python scanner.py --model samples/demo_model --output ./out --quiet || true
          test -f ./out/findings.json
          test -f ./out/audit_report.md
          test -f ./out/sbom.cdx.json
          # Validate the SBOM is well-formed CycloneDX 1.5.
          python -c "import json; d=json.load(open('./out/sbom.cdx.json')); assert d['specVersion']=='1.5' and d['bomFormat']=='CycloneDX'"

  threat-intel-summarizer:
    name: Project 7 — pytest + offline summarizer + citation audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: 07-threat-intel-summarizer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: 07-threat-intel-summarizer/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (offline, no API key)
        run: pytest -q

      - name: Summarize sample bundles in offline mode
        # Stub client should produce zero hallucinations; CLI returns 0
        # only when the citation audit is clean.
        run: |
          python summarizer.py --offline --output ./out --quiet
          test -f ./out/briefs/01-phishing-campaign.md
          test -f ./out/briefs/02-cve-advisory.md
          test -f ./out/citation_audit.json
          # Confirm zero hallucinations from the stub client.
          python -c "import json; d=json.load(open('./out/citation_audit.json')); assert d['total_hallucinations']==0, d"
