# rule_id: AIPI-001
# name: Malicious Prompt Injection Detected
# severity: high
# owasp: LLM01
# atlas: AML.T0051
# airmf: MEASURE 2.7
# description: Fires on any malicious-verdict event from the Project 1 prompt-injection detector. These represent direct injection attempts that the heuristic layer (PI-001..PI-009) classified as malicious — typically multiple high-severity rules firing on a single user input.
#
# Generated by Project 4 SIEM Correlation Generator. Drop into a
# Morpheus deployment under config/pipelines/. The stage list is
# canonical — translate each entry into pipeline.add_stage(...)
# calls in your runner script. Filter conditions are cuDF-
# compatible boolean expressions evaluated on the GPU dataframe.

pipeline:
  name: ai-security-aipi-001
  feature_length: 256
  num_threads: 4
  pipeline_batch_size: 1024
  edge_buffer_size: 128

  source:
    type: from-kafka
    bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS}
    input_topic: aisec-events
    group_id: morpheus-aipi-001

  stages:
    - type: deserialize

    - type: monitor
      description: "Source — incoming aisec events"

    - type: filter
      filter_source: PAYLOAD
      condition: 'cim_eventtype == "ai_prompt_injection" and verdict == "malicious"'

    - type: monitor
      description: "Matches — AIPI-001 condition fired"

    - type: aggregate
      group_by: [user, app]
      threshold_count: 1
      window_seconds: 3600

    - type: add-class
      class_name: notable_event
      severity: high
      drilldown_field: src_input_excerpt
      rule_id: AIPI-001

    - type: serialize

  sink:
    type: to-kafka
    bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS}
    output_topic: aisec-notables

tags:
  rule_id: AIPI-001
  owasp_llm: LLM01
  mitre_atlas: [AML.T0051]
  airmf: MEASURE 2.7
  source_index: aisec
  sourcetype: "aisec:prompt_injection"
