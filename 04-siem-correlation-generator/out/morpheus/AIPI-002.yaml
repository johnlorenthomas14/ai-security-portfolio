# rule_id: AIPI-002
# name: Suspicious Prompt Injection Burst from Single User
# severity: medium
# owasp: LLM01
# atlas: AML.T0051, AML.T0054
# airmf: MEASURE 2.7
# description: Catches a burst of suspicious-verdict events from one user in a short window. Single suspicious events are common (clumsy phrasing, edge-case inputs) but a burst from one user inside an hour is the access-pattern signature of someone iterating on injection payloads to find one that works. Threshold tunable per environment.
#
# Generated by Project 4 SIEM Correlation Generator. Drop into a
# Morpheus deployment under config/pipelines/. The stage list is
# canonical — translate each entry into pipeline.add_stage(...)
# calls in your runner script. Filter conditions are cuDF-
# compatible boolean expressions evaluated on the GPU dataframe.

pipeline:
  name: ai-security-aipi-002
  feature_length: 256
  num_threads: 4
  pipeline_batch_size: 1024
  edge_buffer_size: 128

  source:
    type: from-kafka
    bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS}
    input_topic: aisec-events
    group_id: morpheus-aipi-002

  stages:
    - type: deserialize

    - type: monitor
      description: "Source — incoming aisec events"

    - type: filter
      filter_source: PAYLOAD
      condition: 'cim_eventtype == "ai_prompt_injection" and verdict == "suspicious"'

    - type: monitor
      description: "Matches — AIPI-002 condition fired"

    - type: aggregate
      group_by: [user]
      threshold_count: 5
      window_seconds: 3600

    - type: add-class
      class_name: notable_event
      severity: medium
      drilldown_field: src_input_excerpt
      rule_id: AIPI-002

    - type: serialize

  sink:
    type: to-kafka
    bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS}
    output_topic: aisec-notables

tags:
  rule_id: AIPI-002
  owasp_llm: LLM01
  mitre_atlas: [AML.T0051, AML.T0054]
  airmf: MEASURE 2.7
  source_index: aisec
  sourcetype: "aisec:prompt_injection"
