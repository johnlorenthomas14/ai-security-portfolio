# rule_id: AIRG-001
# name: Credentials Detected in RAG Corpus Document
# severity: critical
# owasp: LLM02
# atlas: AML.T0024
# airmf: MEASURE 2.10
# description: Fires when the Project 3 RAG auditor finds a credential leak in a corpus document — AWS keys, GitHub tokens, Anthropic / OpenAI keys, PEM-block private keys, or .env-style credential variables. Once a document is in the corpus, retrieval can surface its contents to any authorized user — meaning a credential in the corpus is effectively shared with the entire authorized-user population.
#
# Generated by Project 4 SIEM Correlation Generator. Drop into a
# Morpheus deployment under config/pipelines/. The stage list is
# canonical — translate each entry into pipeline.add_stage(...)
# calls in your runner script. Filter conditions are cuDF-
# compatible boolean expressions evaluated on the GPU dataframe.

pipeline:
  name: ai-security-airg-001
  feature_length: 256
  num_threads: 4
  pipeline_batch_size: 1024
  edge_buffer_size: 128

  source:
    type: from-kafka
    bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS}
    input_topic: aisec-events
    group_id: morpheus-airg-001

  stages:
    - type: deserialize

    - type: monitor
      description: "Source — incoming aisec events"

    - type: filter
      filter_source: PAYLOAD
      condition: 'cim_eventtype == "ai_rag_finding" and category == "secret_leak"'

    - type: monitor
      description: "Matches — AIRG-001 condition fired"

    - type: aggregate
      group_by: [document_path]
      threshold_count: 1
      window_seconds: 86400

    - type: add-class
      class_name: notable_event
      severity: critical
      drilldown_field: document_path
      rule_id: AIRG-001

    - type: serialize

  sink:
    type: to-kafka
    bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS}
    output_topic: aisec-notables

tags:
  rule_id: AIRG-001
  owasp_llm: LLM02
  mitre_atlas: [AML.T0024]
  airmf: MEASURE 2.10
  source_index: aisec
  sourcetype: "aisec:rag_audit"
