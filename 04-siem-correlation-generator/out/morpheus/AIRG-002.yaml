# rule_id: AIRG-002
# name: Classification Marker Spillage in RAG Corpus
# severity: critical
# owasp: LLM02
# atlas: AML.T0024
# airmf: GOVERN 1.3
# description: Fires when the Project 3 RAG auditor finds a sensitivity / classification marker (CUI, FOUO, CONFIDENTIAL, SECRET, ITAR, ATTORNEY-CLIENT, PHI) in a corpus document that's queryable by general users. A document carrying any of these markers in an unrestricted RAG corpus is — at minimum — a policy violation, and at the higher tiers, a classified-spillage incident.
#
# Generated by Project 4 SIEM Correlation Generator. Drop into a
# Morpheus deployment under config/pipelines/. The stage list is
# canonical — translate each entry into pipeline.add_stage(...)
# calls in your runner script. Filter conditions are cuDF-
# compatible boolean expressions evaluated on the GPU dataframe.

pipeline:
  name: ai-security-airg-002
  feature_length: 256
  num_threads: 4
  pipeline_batch_size: 1024
  edge_buffer_size: 128

  source:
    type: from-kafka
    bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS}
    input_topic: aisec-events
    group_id: morpheus-airg-002

  stages:
    - type: deserialize

    - type: monitor
      description: "Source — incoming aisec events"

    - type: filter
      filter_source: PAYLOAD
      condition: 'cim_eventtype == "ai_rag_finding" and category == "sensitivity_marker"'

    - type: monitor
      description: "Matches — AIRG-002 condition fired"

    - type: aggregate
      group_by: [document_path]
      threshold_count: 1
      window_seconds: 86400

    - type: add-class
      class_name: notable_event
      severity: critical
      drilldown_field: document_path
      rule_id: AIRG-002

    - type: serialize

  sink:
    type: to-kafka
    bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS}
    output_topic: aisec-notables

tags:
  rule_id: AIRG-002
  owasp_llm: LLM02
  mitre_atlas: [AML.T0024]
  airmf: GOVERN 1.3
  source_index: aisec
  sourcetype: "aisec:rag_audit"
