# rule_id: AIRT-001
# name: Red-Team Probe Identified Capitulation in Production Target
# severity: high
# owasp: LLM01
# atlas: AML.T0051, AML.T0054
# airmf: MEASURE 2.7
# description: Fires on any fail-verdict event from a Project 2 red-team scan. A fail verdict means the framework confirmed the target capitulated to a probe — i.e., a reproducible vulnerability against a deployed LLM application. Critical findings indicate confirmed control gaps that require immediate Manage-function action: system-prompt update, input-layer detector deployment, or output-layer guardrail.
#
# Generated by Project 4 SIEM Correlation Generator. Drop into a
# Morpheus deployment under config/pipelines/. The stage list is
# canonical — translate each entry into pipeline.add_stage(...)
# calls in your runner script. Filter conditions are cuDF-
# compatible boolean expressions evaluated on the GPU dataframe.

pipeline:
  name: ai-security-airt-001
  feature_length: 256
  num_threads: 4
  pipeline_batch_size: 1024
  edge_buffer_size: 128

  source:
    type: from-kafka
    bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS}
    input_topic: aisec-events
    group_id: morpheus-airt-001

  stages:
    - type: deserialize

    - type: monitor
      description: "Source — incoming aisec events"

    - type: filter
      filter_source: PAYLOAD
      condition: 'cim_eventtype == "ai_red_team_finding" and verdict == "fail"'

    - type: monitor
      description: "Matches — AIRT-001 condition fired"

    - type: aggregate
      group_by: [target_name, owasp_category]
      threshold_count: 1
      window_seconds: 3600

    - type: add-class
      class_name: notable_event
      severity: high
      drilldown_field: probe_id
      rule_id: AIRT-001

    - type: serialize

  sink:
    type: to-kafka
    bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS}
    output_topic: aisec-notables

tags:
  rule_id: AIRT-001
  owasp_llm: LLM01
  mitre_atlas: [AML.T0051, AML.T0054]
  airmf: MEASURE 2.7
  source_index: aisec
  sourcetype: "aisec:red_team"
