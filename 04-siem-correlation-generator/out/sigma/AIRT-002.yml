title: System Prompt Leakage Confirmed by Red-Team Probe
id: 228ab153-c058-6fd0-15a8-12194533e86e
status: experimental
description: |
  Fires when a Project 2 red-team probe in the LLM07 (System Prompt
  Leakage) category lands a fail verdict. The probe tests whether the
  target LLM application's system prompt can be extracted via direct
  request, repeat-verbatim phrasing, or roleplay-extraction — and the
  fail verdict confirms it can. System-prompt leakage is foundational
  for further attacks (override, code extraction, refusal bypass) so
  this is treated as a high-priority finding.
references:
  - https://atlas.mitre.org/
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
author: AI Security Portfolio (Project 4 generator)
date: 2026/04/30
tags:
  - attack.llm07
  - atlas.aml-t0051
  - airmf.measure_2_7
logsource:
  product: aisec
  service: red_team_finding
detection:
  selection:
    owasp_category: LLM07
  condition: selection
fields:
  - target_name
  - probe_id
falsepositives:
  - Authorized red-team exercises against the AI application
  - Internal QA running probe libraries against staging targets
level: high
