id: AIRG-001
name: Credentials Detected in RAG Corpus Document
description: |
  Fires when the Project 3 RAG auditor finds a credential leak in a
  corpus document — AWS keys, GitHub tokens, Anthropic / OpenAI keys,
  PEM-block private keys, or .env-style credential variables. Once a
  document is in the corpus, retrieval can surface its contents to any
  authorized user — meaning a credential in the corpus is effectively
  shared with the entire authorized-user population.

source_index: aisec
sourcetype: aisec:rag_audit
event_type: ai_rag_finding

severity: critical
mitre_atlas: [AML.T0024]
owasp_llm: LLM02
airmf: MEASURE 2.10

condition:
  field: category
  operator: equals
  value: secret_leak

aggregation:
  group_by: [document_path]
  threshold_count: 1
  window: 1d

response:
  notable_event: true
  drilldown_field: document_path
  recommended_action: |
    Rotate the leaked credential immediately. Remove the document from
    the corpus. Add the credential pattern to a pre-ingestion DLP rule
    so the same secret cannot re-enter via a duplicate document.
