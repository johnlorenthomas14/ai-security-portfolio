id: AIRG-002
name: Classification Marker Spillage in RAG Corpus
description: |
  Fires when the Project 3 RAG auditor finds a sensitivity / classification
  marker (CUI, FOUO, CONFIDENTIAL, SECRET, ITAR, ATTORNEY-CLIENT, PHI) in
  a corpus document that's queryable by general users. A document carrying
  any of these markers in an unrestricted RAG corpus is — at minimum — a
  policy violation, and at the higher tiers, a classified-spillage incident.

source_index: aisec
sourcetype: aisec:rag_audit
event_type: ai_rag_finding

severity: critical
mitre_atlas: [AML.T0024]
owasp_llm: LLM02
airmf: GOVERN 1.3

condition:
  field: category
  operator: equals
  value: sensitivity_marker

aggregation:
  group_by: [document_path]
  threshold_count: 1
  window: 1d

response:
  notable_event: true
  drilldown_field: document_path
  recommended_action: |
    Notify the corpus owner and the program's classification authority.
    Quarantine the document pending review. Confirm the corpus's
    access-control posture matches the marker's handling requirements
    (CUI per 32 CFR 2002, ITAR per 22 CFR 120-130, PHI per 45 CFR 164).
