id: AIRT-001
name: Red-Team Probe Identified Capitulation in Production Target
description: |
  Fires on any fail-verdict event from a Project 2 red-team scan. A fail
  verdict means the framework confirmed the target capitulated to a
  probe — i.e., a reproducible vulnerability against a deployed LLM
  application. Critical findings indicate confirmed control gaps that
  require immediate Manage-function action: system-prompt update,
  input-layer detector deployment, or output-layer guardrail.

source_index: aisec
sourcetype: aisec:red_team
event_type: ai_red_team_finding

severity: high
mitre_atlas: [AML.T0051, AML.T0054]
owasp_llm: LLM01
airmf: MEASURE 2.7

condition:
  field: verdict
  operator: equals
  value: fail

aggregation:
  group_by: [target_name, owasp_category]
  threshold_count: 1
  window: 1h

response:
  notable_event: true
  drilldown_field: probe_id
  recommended_action: |
    Open the AI RMF evidence report for this run in the audit channel.
    For each fail finding, confirm whether the target's system prompt
    or input-layer guardrail was updated within the last 30 days; if
    not, this is a control-coverage gap rather than a control-effectiveness
    one.
