id: AIRT-003
name: Jailbreak Persona Adoption Confirmed
description: |
  Fires on a Project 2 red-team probe in the LLM09 (Misinformation /
  Jailbreak) category that landed a fail verdict. Confirms the target
  adopted a named persona override (DAN, AIM, developer-mode, etc.) —
  i.e., the model's RLHF-trained refusal posture was successfully
  bypassed. Once a persona override succeeds, the model is effectively
  ungoverned for the rest of that conversation.

source_index: aisec
sourcetype: aisec:red_team
event_type: ai_red_team_finding

severity: high
mitre_atlas: [AML.T0054]
owasp_llm: LLM09
airmf: MEASURE 2.6

condition:
  field: owasp_category
  operator: equals
  value: LLM09

aggregation:
  group_by: [target_name]
  threshold_count: 1
  window: 1d

response:
  notable_event: true
  drilldown_field: probe_id
  recommended_action: |
    Add an output-layer guardrail that flags persona-acknowledgement
    phrasings ("As DAN…", "developer mode is on", "no restrictions").
    Persona override is recoverable at the conversation boundary —
    starting a new session resets the model — but each open session
    is compromised until end.
